<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | ClimMate</title>
  <meta name="description" content="Reset your ClimMate account password.">
  <link rel="icon" type="image/png" href="/climmate-legal/assets/icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F7F7F7;
      color: #1C1C1E;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 24px;
    }
    .brand img { width: 28px; height: 28px; border-radius: 6px; }
    h1 {
      font-size: 24px;
      margin: 0 0 8px;
      color: #306E6F;
      font-weight: 700;
    }
    p.lead {
      font-size: 15px;
      color: #555;
      margin: 0 0 24px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin: 16px 0 6px;
      color: #444;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #306E6F;
    }
    button {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      background: #1C1C1E;
      color: #fff;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
    }
    .msg.success { background: #E8F4F4; color: #306E6F; }
    .msg.error { background: #FCEDEE; color: #D33F49; }
    .open-app {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 24px;
      background: #306E6F;
      color: #fff;
      text-decoration: none;
      border-radius: 20px;
      font-weight: 600;
    }
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #999;
      text-align: center;
    }
    .footer a { color: #306E6F; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/climmate-legal/assets/icon.png" alt="">
      climMate
    </div>

    <div id="form-area">
      <h1>Reset password</h1>
      <p class="lead">Enter a new password for your ClimMate account. Minimum 6 characters.</p>

      <form id="reset-form" autocomplete="off">
        <label for="pw">New password</label>
        <input type="password" id="pw" name="pw" minlength="6" required autocomplete="new-password">

        <label for="pw2">Confirm password</label>
        <input type="password" id="pw2" name="pw2" minlength="6" required autocomplete="new-password">

        <button type="submit" id="submit-btn">Reset password</button>
      </form>
      <div id="msg"></div>
    </div>

    <div class="footer">
      Need help? <a href="mailto:support@climmatestudio.com">support@climmatestudio.com</a>
    </div>
  </div>

  <script>
    (function () {
      var API_BASE = "https://climbingplanbackend-production.up.railway.app";

      var params = new URLSearchParams(window.location.search);
      var token = params.get("token");

      var form = document.getElementById("reset-form");
      var btn = document.getElementById("submit-btn");
      var msg = document.getElementById("msg");
      var formArea = document.getElementById("form-area");

      function showMsg(text, kind) {
        msg.className = "msg " + kind;
        msg.textContent = text;
      }

      if (!token) {
        formArea.innerHTML =
          '<h1>Invalid link</h1>' +
          '<p class="lead">This reset link is missing its token. Open ClimMate and request a new password reset.</p>' +
          '<a class="open-app" href="climmate://">Open ClimMate</a>';
        return;
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var pw = document.getElementById("pw").value;
        var pw2 = document.getElementById("pw2").value;

        if (pw.length < 6) {
          showMsg("Password must be at least 6 characters.", "error");
          return;
        }
        if (pw !== pw2) {
          showMsg("Passwords don't match.", "error");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Resetting...";
        msg.className = "";
        msg.textContent = "";

        fetch(API_BASE + "/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token, new_password: pw }),
        })
          .then(function (resp) {
            return resp.json().then(function (body) {
              return { status: resp.status, body: body };
            });
          })
          .then(function (r) {
            if (r.status === 200 && r.body && r.body.ok) {
              formArea.innerHTML =
                '<h1>Password reset</h1>' +
                '<p class="lead">Your password has been updated. Open ClimMate and sign in with your new password.</p>' +
                '<a class="open-app" href="climmate://">Open ClimMate</a>';
              return;
            }
            var detail = (r.body && r.body.detail) || "Reset failed. The link may be expired — request a new one from the app.";
            showMsg(detail, "error");
            btn.disabled = false;
            btn.textContent = "Reset password";
          })
          .catch(function () {
            showMsg("Network error. Please try again.", "error");
            btn.disabled = false;
            btn.textContent = "Reset password";
          });
      });
    })();
  </script>
</body>
</html>
